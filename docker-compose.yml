services:

  # ── Banco de dados principal (busca aberta + fechada) ──────────────────────
  db-principal:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_PRINCIPAL_NAME:-tcc_principal}
      POSTGRES_USER: ${DB_USER:-tcc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
    volumes:
      - db-principal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tcc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Banco de dados BOLO (servidor físico separado) ─────────────────────────
  db-bolo:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_BOLO_NAME:-tcc_bolo}
      POSTGRES_USER: ${DB_USER:-tcc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
    volumes:
      - db-bolo-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tcc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Servidor de custódia (banco principal) ─────────────────────────────────
  servidor:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        TARGET: servidor
    env_file: .env
    environment:
      DB_HOST: db-principal
      DB_PORT: "5432"
      DB_NAME: ${DB_PRINCIPAL_NAME:-tcc_principal}
      DB_USER: ${DB_USER:-tcc}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
    ports:
      - "${SERVIDOR_PORT:-8080}:8080"
    depends_on:
      db-principal:
        condition: service_healthy

  # ── Servidor BOLO ──────────────────────────────────────────────────────────
  bolo:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        TARGET: bolo
    env_file: .env
    environment:
      DB_HOST: db-bolo
      DB_PORT: "5432"
      DB_NAME: ${DB_BOLO_NAME:-tcc_bolo}
      DB_USER: ${DB_USER:-tcc}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
    ports:
      - "${BOLO_PORT:-8081}:8081"
    depends_on:
      db-bolo:
        condition: service_healthy

  # ── Coletor (simulador ALPR) ───────────────────────────────────────────────
  coletor:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        TARGET: coletor
    env_file: .env
    environment:
      SERVIDOR_URL: http://servidor:8080
      BOLO_URL: http://bolo:8081
      CAMERA_ID: ${CAMERA_ID:-CAM-SIM-001}
      KEY_MONTH: ${KEY_MONTH:-2026-06}
    depends_on:
      - servidor
      - bolo

  # ── Governança (juiz + auditor) ────────────────────────────────────────────
  governanca:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        TARGET: governanca
    env_file: .env
    ports:
      - "${GOVERNANCA_PORT:-8082}:8082"
    depends_on:
      - servidor

volumes:
  db-principal-data:
  db-bolo-data:
